<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — Perfect Sales Entp.</title>
  <style>

    /* ===== RESET ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ===== ROOT TOKENS ===== */
    :root {
      --bg:        #f0f2f5;
      --surface:   #ffffff;
      --navy:      #2c3e50;
      --gold:      #f39c12;
      --gold-soft: #fef3dc;
      --green:     #27ae60;
      --red:       #e74c3c;
      --red-soft:  #fdecea;
      --border:    #e0e4ea;
      --text:      #2c3e50;
      --muted:     #7f8c8d;
      --radius:    10px;
      --shadow:    0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ========================================================
       LOGIN SCREEN
    ======================================================== */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a252f 0%, #2c3e50 100%);
      padding: 20px;
    }

    .login-wrap {
      background: var(--surface);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
      text-align: center;
    }

    .login-wrap .lock-icon {
      font-size: 40px;
      margin-bottom: 14px;
    }

    .login-wrap h2 {
      font-size: 22px;
      color: var(--navy);
      margin-bottom: 4px;
    }

    .login-wrap .sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .login-field {
      margin-bottom: 16px;
      text-align: left;
    }

    .login-field label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .login-field input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      color: var(--text);
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-field input:focus { border-color: var(--gold); background: white; }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .login-btn:hover { background: #1a252f; }

    .login-error {
      display: none;
      background: var(--red-soft);
      color: var(--red);
      border: 1px solid #f5c6cb;
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .login-error.show { display: block; }

    /* ========================================================
       MAIN ADMIN LAYOUT
    ======================================================== */
    #admin-screen { display: none; }

    /* ---- Top navbar ---- */
    .admin-nav {
      background: var(--navy);
      padding: 14px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .admin-nav .brand {
      color: var(--gold);
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .admin-nav .brand span {
      color: #aab8c2;
      font-size: 13px;
      font-weight: normal;
      margin-left: 10px;
    }

    .admin-nav .logout-btn {
      background: none;
      border: 1px solid #aaa;
      color: #ccc;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .admin-nav .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* ---- Page body ---- */
    .admin-body {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    /* ---- Section cards ---- */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      overflow: hidden;
    }

    .card-header {
      background: var(--navy);
      color: white;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-header .count-badge {
      background: var(--gold);
      color: var(--navy);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: bold;
      margin-left: auto;
    }

    .card-body { padding: 20px; }

    /* ========================================================
       ADD PRODUCT FORM
    ======================================================== */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width: 580px) { .form-grid { grid-template-columns: 1fr; } }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      font-size: 12px;
      font-weight: bold;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .form-group input,
    .form-group select {
      padding: 11px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus { border-color: var(--gold); background: white; }

    /* Image upload area */
    .img-upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fafafa;
    }

    .img-upload-area:hover { border-color: var(--gold); background: var(--gold-soft); }

    .img-upload-area input[type="file"] { display: none; }

    .img-upload-area .upload-hint {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    .img-preview-wrap {
      margin-top: 10px;
      display: none;
    }

    .img-preview-wrap img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid var(--border);
    }

    .add-product-btn {
      grid-column: 1 / -1;
      padding: 13px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-product-btn:hover { background: #1a252f; }

    .form-msg {
      display: none;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 10px;
      grid-column: 1 / -1;
    }

    .form-msg.success { display: block; background: #eafaf1; color: var(--green); border: 1px solid #a9dfbf; }
    .form-msg.error   { display: block; background: var(--red-soft); color: var(--red); border: 1px solid #f5c6cb; }

    /* ========================================================
       PRODUCT TABLE
    ======================================================== */
    .product-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .product-table th {
      text-align: left;
      padding: 10px 12px;
      background: #f8f9fa;
      border-bottom: 2px solid var(--border);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--muted);
    }

    .product-table td {
      padding: 12px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .product-table tr:last-child td { border-bottom: none; }
    .product-table tr:hover td { background: #fafbfc; }

    /* Product thumbnail in table */
    .prod-thumb {
      width: 46px;
      height: 46px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .prod-thumb-placeholder {
      width: 46px;
      height: 46px;
      background: #dce3ea;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    /* Stock badge */
    .stock-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .stock-badge.ok  { background: #eafaf1; color: var(--green); }
    .stock-badge.low { background: var(--red-soft); color: var(--red); }
    .stock-badge.out { background: #f4f4f4; color: #999; }

    /* Stock adjust controls */
    .stock-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stock-controls input[type="number"] {
      width: 60px;
      padding: 6px 8px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      outline: none;
    }

    .stock-controls input[type="number"]:focus { border-color: var(--gold); }

    .sc-btn {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .sc-btn:hover { opacity: 0.82; }
    .sc-btn.add    { background: var(--green); color: white; }
    .sc-btn.remove { background: var(--red);   color: white; }

    /* Row action buttons */
    .action-btns { display: flex; gap: 6px; align-items: center; }

    .del-btn {
      padding: 6px 10px;
      background: var(--red-soft);
      color: var(--red);
      border: 1px solid #f5c6cb;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.15s;
    }

    .del-btn:hover { background: var(--red); color: white; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 15px;
    }

    /* ========================================================
       TOAST
    ======================================================== */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--navy);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 3000;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.green { background: var(--green); }
    .toast.red   { background: var(--red);   }

    /* ========================================================
       RESPONSIVE
    ======================================================== */
    @media (max-width: 680px) {
      .product-table thead { display: none; }
      .product-table, .product-table tbody, .product-table tr, .product-table td {
        display: block; width: 100%;
      }
      .product-table tr { margin-bottom: 14px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
      .product-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
      .product-table td::before {
        content: attr(data-label) ": ";
        font-weight: bold; font-size: 11px;
        text-transform: uppercase; color: var(--muted);
        display: block; margin-bottom: 4px;
      }
    }

  </style>
</head>
<body>

<!-- ============================================================
     LOGIN SCREEN
============================================================ -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="lock-icon">🔒</div>
    <h2>Admin Login</h2>
    <p class="sub">Perfect Sales Entp. — Owner Access Only</p>

    <div class="login-error" id="login-error">⚠️ Wrong username or password</div>

    <div class="login-field">
      <label>Username</label>
      <input type="text" id="admin-user" placeholder="Enter username" autocomplete="off"/>
    </div>

    <div class="login-field">
      <label>Password</label>
      <input type="password" id="admin-pass" placeholder="Enter password"/>
    </div>

    <button class="login-btn" onclick="adminLogin()">Login →</button>
  </div>
</div>

<!-- ============================================================
     ADMIN SCREEN
============================================================ -->
<div id="admin-screen">

  <!-- Navbar -->
  <nav class="admin-nav">
    <div class="brand">
      Perfect Sales Entp.
      <span>Admin Panel</span>
    </div>
    <button class="logout-btn" onclick="adminLogout()">Logout</button>
  </nav>

  <div class="admin-body">

    <!-- ===== ADD PRODUCT CARD ===== -->
    <div class="card">
      <div class="card-header">➕ Add New Product</div>
      <div class="card-body">
        <div class="form-grid">

          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="f-name" placeholder="e.g. Premium Rice (5kg)"/>
          </div>

          <div class="form-group">
            <label>Category</label>
            <select id="f-category">
              <option value="">— Select Category —</option>
              <option>Grocery</option>
              <option>Cleaning</option>
              <option>Household</option>
              <option>Beverages</option>
              <option>Personal Care</option>
              <option>Stationery</option>
              <option>Other</option>
            </select>
          </div>

          <div class="form-group">
            <label>Initial Stock (units)</label>
            <input type="number" id="f-stock" placeholder="e.g. 50" min="0"/>
          </div>

          <div class="form-group">
            <label>Low Stock Alert Below</label>
            <input type="number" id="f-lowat" placeholder="e.g. 10" min="1"/>
          </div>

          <div class="form-group full">
            <label>Product Image</label>
            <label class="img-upload-area" id="upload-label" for="f-image">
              <div style="font-size:30px;">📷</div>
              <div class="upload-hint">Click to upload an image (JPG, PNG)</div>
              <input type="file" id="f-image" accept="image/*" onchange="previewImage(event)"/>
            </label>
            <div class="img-preview-wrap" id="img-preview-wrap">
              <img id="img-preview" src="" alt="Preview"/>
              <p style="font-size:12px;color:var(--muted);margin-top:4px;">Image selected ✓</p>
            </div>
          </div>

          <div class="form-msg" id="form-msg"></div>

          <button class="add-product-btn" onclick="addProduct()">Add Product to Shop</button>

        </div>
      </div>
    </div>

    <!-- ===== INVENTORY TABLE CARD ===== -->
    <div class="card">
      <div class="card-header">
        📦 Current Inventory
        <span class="count-badge" id="prod-count">0 products</span>
      </div>
      <div class="card-body" style="padding:0;">
        <div id="inventory-wrap">
          <div class="empty-state">No products yet. Add one above ↑</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ============================================================
     JAVASCRIPT
============================================================ -->
<script>

  // ============================================================
  // CONSTANTS — CHANGE THESE TO YOUR OWN CREDENTIALS
  // ============================================================
  const ADMIN_USERNAME = 'perfectsales';
  const ADMIN_PASSWORD = 'bilaspur2024';
  const STORAGE_KEY    = 'pse_products'; // shared key with index.html

  // ============================================================
  // LOGIN / LOGOUT
  // ============================================================

  function adminLogin() {
    let user = document.getElementById('admin-user').value.trim();
    let pass = document.getElementById('admin-pass').value;
    let errEl = document.getElementById('login-error');

    if (user === ADMIN_USERNAME && pass === ADMIN_PASSWORD) {
      errEl.classList.remove('show');
      sessionStorage.setItem('admin_auth', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      renderInventory();
    } else {
      errEl.classList.add('show');
    }
  }

  function adminLogout() {
    sessionStorage.removeItem('admin_auth');
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-user').value = '';
    document.getElementById('admin-pass').value = '';
  }

  // Auto-login if session active
  if (sessionStorage.getItem('admin_auth') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
  }

  // Enter key on login
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
      adminLogin();
    }
  });

  // ============================================================
  // PRODUCT DATA — load/save from localStorage
  // ============================================================

  function loadProducts() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveProducts(arr) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
  }

  // ============================================================
  // IMAGE PREVIEW
  // ============================================================

  let imageBase64 = '';

  function previewImage(event) {
    let file = event.target.files[0];
    if (!file) return;

    let reader = new FileReader();
    reader.onload = function(e) {
      imageBase64 = e.target.result;
      document.getElementById('img-preview').src = imageBase64;
      document.getElementById('img-preview-wrap').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  // ============================================================
  // ADD PRODUCT
  // ============================================================

  function addProduct() {
    let name     = document.getElementById('f-name').value.trim();
    let category = document.getElementById('f-category').value;
    let stock    = parseInt(document.getElementById('f-stock').value);
    let lowAt    = parseInt(document.getElementById('f-lowat').value) || 10;
    let msgEl    = document.getElementById('form-msg');

    // Validation
    if (!name) {
      showFormMsg('error', '⚠️ Please enter a product name.');
      return;
    }
    if (!category) {
      showFormMsg('error', '⚠️ Please select a category.');
      return;
    }
    if (isNaN(stock) || stock < 0) {
      showFormMsg('error', '⚠️ Please enter a valid stock quantity.');
      return;
    }

    let products = loadProducts();

    // Check duplicate name
    if (products.find(p => p.name.toLowerCase() === name.toLowerCase())) {
      showFormMsg('error', '⚠️ A product with this name already exists.');
      return;
    }

    let newProduct = {
      id:       Date.now(),
      name:     name,
      category: category,
      stock:    stock,
      lowAt:    lowAt,
      image:    imageBase64 || ''
    };

    products.push(newProduct);
    saveProducts(products);

    // Reset form
    document.getElementById('f-name').value     = '';
    document.getElementById('f-category').value = '';
    document.getElementById('f-stock').value    = '';
    document.getElementById('f-lowat').value    = '';
    document.getElementById('f-image').value    = '';
    imageBase64 = '';
    document.getElementById('img-preview-wrap').style.display = 'none';

    showFormMsg('success', '✅ Product "' + name + '" added! Customers will see it after refreshing index.html.');
    renderInventory();
    showToast('✅ ' + name + ' added!', 'green');
  }

  // ============================================================
  // ADJUST STOCK
  // ============================================================

  function adjustStock(id, type) {
    let inputEl = document.getElementById('qty-' + id);
    let qty     = parseInt(inputEl.value);

    if (isNaN(qty) || qty <= 0) {
      showToast('⚠️ Enter a valid quantity', 'red');
      return;
    }

    let products = loadProducts();
    let product  = products.find(p => p.id === id);
    if (!product) return;

    if (type === 'add') {
      product.stock += qty;
      showToast('✅ Added ' + qty + ' units to ' + product.name, 'green');
    } else {
      if (qty > product.stock) {
        showToast('⚠️ Cannot remove more than current stock (' + product.stock + ')', 'red');
        return;
      }
      product.stock -= qty;
      showToast('🔻 Removed ' + qty + ' units from ' + product.name, '');
    }

    inputEl.value = '';
    saveProducts(products);
    renderInventory();
  }

  // ============================================================
  // DELETE PRODUCT
  // ============================================================

  function deleteProduct(id, name) {
    if (!confirm('Delete "' + name + '"? This will remove it from the shop.')) return;
    let products = loadProducts().filter(p => p.id !== id);
    saveProducts(products);
    renderInventory();
    showToast('🗑️ ' + name + ' removed.', 'red');
  }

  // ============================================================
  // RENDER INVENTORY TABLE
  // ============================================================

  function renderInventory() {
    let products = loadProducts();
    let wrap     = document.getElementById('inventory-wrap');
    let countEl  = document.getElementById('prod-count');

    countEl.textContent = products.length + ' product' + (products.length !== 1 ? 's' : '');

    if (products.length === 0) {
      wrap.innerHTML = '<div class="empty-state">No products yet. Add one above ↑</div>';
      return;
    }

    let html = `
      <table class="product-table">
        <thead>
          <tr>
            <th>Image</th>
            <th>Product</th>
            <th>Category</th>
            <th>Stock</th>
            <th>Adjust Stock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
    `;

    products.forEach(function(p) {

      // Stock badge
      let badgeClass, badgeText;
      if (p.stock === 0) {
        badgeClass = 'out'; badgeText = 'Out of Stock';
      } else if (p.stock <= p.lowAt) {
        badgeClass = 'low'; badgeText = 'Low: ' + p.stock + ' units';
      } else {
        badgeClass = 'ok';  badgeText = 'In Stock: ' + p.stock + ' units';
      }

      // Thumbnail
      let thumbHtml = p.image
        ? `<img class="prod-thumb" src="${p.image}" alt="${p.name}"/>`
        : `<div class="prod-thumb-placeholder">📦</div>`;

      html += `
        <tr>
          <td data-label="Image">${thumbHtml}</td>
          <td data-label="Product"><strong>${p.name}</strong></td>
          <td data-label="Category">${p.category}</td>
          <td data-label="Stock"><span class="stock-badge ${badgeClass}">${badgeText}</span></td>
          <td data-label="Adjust">
            <div class="stock-controls">
              <input type="number" id="qty-${p.id}" min="1" placeholder="Qty"/>
              <button class="sc-btn add"    onclick="adjustStock(${p.id}, 'add')">+ Add</button>
              <button class="sc-btn remove" onclick="adjustStock(${p.id}, 'remove')">− Remove</button>
            </div>
          </td>
          <td data-label="Actions">
            <div class="action-btns">
              <button class="del-btn" onclick="deleteProduct(${p.id}, '${p.name.replace(/'/g,"\\'")}')">🗑️ Delete</button>
            </div>
          </td>
        </tr>
      `;
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;
  }

  // ============================================================
  // UI HELPERS
  // ============================================================

  function showFormMsg(type, text) {
    let el = document.getElementById('form-msg');
    el.className = 'form-msg ' + type;
    el.textContent = text;
    setTimeout(() => { el.className = 'form-msg'; }, 5000);
  }

  function showToast(msg, type) {
    let t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || '');
    t.classList.add('show');
    setTimeout(() => { t.classList.remove('show'); }, 2800);
  }

  // ============================================================
  // INIT
  // ============================================================

  if (sessionStorage.getItem('admin_auth') === '1') {
    renderInventory();
  }

</script>
</body>
</html>
